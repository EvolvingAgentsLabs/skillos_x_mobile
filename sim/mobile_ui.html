<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>skillos_x_mobile — CareCompanion</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
  #phone { width: 380px; height: 700px; background: #16213e; border-radius: 24px; border: 3px solid #333; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  #header { padding: 16px; background: #0f3460; text-align: center; }
  #header h1 { font-size: 16px; color: #53cfcf; font-weight: 600; }
  #header .subtitle { font-size: 11px; color: #888; margin-top: 2px; }
  #notifications { padding: 8px 12px; max-height: 100px; overflow-y: auto; background: #0a1628; }
  .notif { background: #1e3a5f; border-radius: 8px; padding: 8px 12px; margin: 4px 0; font-size: 12px; }
  .notif .notif-title { color: #e94560; font-weight: bold; }
  .notif .notif-body { color: #ccc; margin-top: 2px; }
  .notif .notif-time { color: #666; font-size: 10px; float: right; }
  #checklist-area { padding: 8px 12px; display: none; }
  #checklist-area h3 { font-size: 13px; color: #7bed9f; margin-bottom: 6px; }
  .check-item { font-size: 12px; padding: 3px 0; color: #ccc; }
  .check-item.done { color: #2ed573; text-decoration: line-through; }
  #chat { flex: 1; overflow-y: auto; padding: 12px; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 16px; max-width: 85%; font-size: 13px; line-height: 1.5; }
  .msg-assistant { background: #0f3460; color: #e0e0e0; border-bottom-left-radius: 4px; }
  .msg-user { background: #2d6a4f; color: #e0e0e0; margin-left: auto; border-bottom-right-radius: 4px; }
  .msg-system { background: #3d1f56; color: #d4a5ff; font-size: 11px; text-align: center; border-radius: 8px; margin: 4px auto; max-width: 90%; }
  #conn { padding: 6px; font-size: 11px; text-align: center; }
  .connected { background: #2d6a4f; color: #b7e4c7; }
  .disconnected { background: #6a2d2d; color: #e4b7b7; }
  #alarms { padding: 4px 12px; display: none; }
  .alarm-badge { display: inline-block; background: #e67e22; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin: 2px; }
  #input-area { display: flex; padding: 8px; background: #0a1628; border-top: 1px solid #333; gap: 8px; }
  #input-area input { flex: 1; background: #1e3a5f; border: 1px solid #444; border-radius: 20px; padding: 10px 16px; color: #e0e0e0; font-size: 14px; outline: none; }
  #input-area input::placeholder { color: #666; }
  #input-area input:focus { border-color: #53cfcf; }
  #input-area button { background: #2d6a4f; border: none; border-radius: 50%; width: 40px; height: 40px; color: #b7e4c7; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  #input-area button:hover { background: #34d399; color: #fff; }
  #input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .typing-indicator { display: none; padding: 8px 14px; color: #888; font-size: 12px; font-style: italic; }
</style>
</head>
<body>
<div id="phone">
  <div id="conn" class="disconnected">Disconnected</div>
  <div id="header">
    <h1>CareCompanion</h1>
    <div class="subtitle">Your personal wellness assistant</div>
  </div>
  <div id="alarms"></div>
  <div id="notifications"></div>
  <div id="checklist-area">
    <h3>Exercise Checklist</h3>
    <div id="checklist"></div>
  </div>
  <div id="chat"></div>
  <div class="typing-indicator" id="typing">CareCompanion is thinking...</div>
  <div id="input-area">
    <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" />
    <button id="send-btn" title="Send">&#9654;</button>
  </div>
</div>

<script>
let step = 0;
let waitingForInput = false;

function addMsg(cls, text) {
  const el = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${cls}`;
  div.textContent = text;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function setTyping(show) {
  document.getElementById('typing').style.display = show ? 'block' : 'none';
}

function setInputEnabled(enabled) {
  const input = document.getElementById('user-input');
  const btn = document.getElementById('send-btn');
  input.disabled = !enabled;
  btn.disabled = !enabled;
  if (enabled) input.focus();
}

function sendMessage() {
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

  // Show user message in chat
  addMsg('msg-user', text);
  input.value = '';

  // Send to server
  ws.send(JSON.stringify({ type: 'user_message', text }));

  // Disable input and show typing
  waitingForInput = false;
  setInputEnabled(false);
  setTyping(true);
}

function addNotification(title, body) {
  const el = document.getElementById('notifications');
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const div = document.createElement('div');
  div.className = 'notif';
  div.innerHTML = `<span class="notif-time">${time}</span><div class="notif-title">${title}</div><div class="notif-body">${body}</div>`;
  el.prepend(div);
}

function addAlarm(time, label) {
  const el = document.getElementById('alarms');
  el.style.display = 'block';
  const span = document.createElement('span');
  span.className = 'alarm-badge';
  span.textContent = `${time} — ${label}`;
  el.appendChild(span);
}

function updateChecklist(items) {
  const area = document.getElementById('checklist-area');
  const el = document.getElementById('checklist');
  area.style.display = 'block';
  el.innerHTML = '';
  items.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = `check-item${item.done ? ' done' : ''}`;
    div.textContent = `${item.done ? '\u2713' : '\u25CB'} ${item.text}`;
    el.appendChild(div);
  });
}

// ── WebSocket ─────────────────────────────────────────────────
const WS_URL = new URLSearchParams(window.location.search).get('ws') || 'ws://localhost:9093';
let ws = null;

function connect() {
  ws = new WebSocket(WS_URL);
  const connEl = document.getElementById('conn');

  ws.onopen = () => {
    connEl.className = 'connected';
    connEl.textContent = 'Connected';
    addMsg('msg-system', 'Connected to CareCompanion');
  };

  ws.onclose = () => {
    connEl.className = 'disconnected';
    connEl.textContent = 'Disconnected - reconnecting...';
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      step = msg.step || step;

      if (msg.type === 'speak') {
        setTyping(false);
        addMsg('msg-assistant', msg.text);
      } else if (msg.type === 'listen') {
        // Don't show — user already sees their own message when they send it
      } else if (msg.type === 'notification') {
        addNotification(msg.title, msg.body);
        addMsg('msg-system', `Notification: ${msg.title}`);
      } else if (msg.type === 'alarm') {
        addAlarm(msg.time, msg.label);
        addMsg('msg-system', `Alarm set: ${msg.time} — ${msg.label}`);
      } else if (msg.type === 'checklist') {
        updateChecklist(msg.items);
      } else if (msg.type === 'halt') {
        setTyping(false);
        addMsg('msg-system', `Session complete`);
        // Re-enable input for next interaction
        waitingForInput = true;
        setInputEnabled(true);
      } else if (msg.type === 'waiting_for_input') {
        setTyping(false);
        waitingForInput = true;
        setInputEnabled(true);
      }
    } catch { /* ignore parse errors */ }
  };
}

connect();

// ── Input handling ──────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', sendMessage);
document.getElementById('user-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>
</body>
</html>
